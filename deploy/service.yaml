# Cloud Run service: app Next.js, database dung Supabase (ket noi truc tiep qua DATABASE_URL)
# Cac bien ${...} duoc envsubst dien tu GitHub Secrets trong workflow deploy.yml
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ${SERVICE_NAME}
  labels:
    cloud.googleapis.com/location: ${REGION}
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - name: app
          image: ${IMAGE}
          ports:
            - name: http1
              containerPort: 3000
          env:
            # Supabase: dung Session pooler URI (port 5432) — xem deploy/README.md
            - name: DATABASE_URL
              value: "${DATABASE_URL}"
            - name: NEXTAUTH_URL
              value: "${NEXTAUTH_URL}"
            - name: NEXTAUTH_SECRET
              value: "${NEXTAUTH_SECRET}"
            - name: GOOGLE_CLIENT_ID
              value: "${GOOGLE_CLIENT_ID}"
            - name: GOOGLE_CLIENT_SECRET
              value: "${GOOGLE_CLIENT_SECRET}"
            - name: SMTP_HOST
              value: "${SMTP_HOST}"
            - name: SMTP_PORT
              value: "${SMTP_PORT}"
            - name: SMTP_USER
              value: "${SMTP_USER}"
            - name: SMTP_PASS
              value: "${SMTP_PASS}"
            - name: EMAIL_FROM
              value: "${EMAIL_FROM}"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
